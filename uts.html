<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KOSAN PIDA- PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #eef2f7, #d9e2ec);
  padding:30px;
  color:#2d3748;
}

h1 {
  text-align:center;
  color:#1a365d;
}

.subtitle {
  text-align:center;
  margin-bottom:20px;
  color:#4a5568;
}

.dashboard {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.card, .box {
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.room {
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:600;
}

.kosong { background:#e6fffa; }
.isi { background:#ffe4e6; }

input, select {
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e0;
  width:100%;
  margin-bottom:10px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary { background:#2b6cb0; color:white; }
.btn-success { background:#2f855a; color:white; }
.btn-warning { background:#b7791f; color:white; }
.btn-danger { background:#c53030; color:white; }

table {
  width:100%;
  border-collapse:collapse;
  border-radius:12px;
  overflow:hidden;
}

th {
  background:#1a365d;
  color:white;
  padding:12px;
}

td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #e2e8f0;
}

.telat1 { background:#fef9c3; }
.telat2 { background:#fee2e2; }

.badge {
  padding:4px 8px;
  border-radius:8px;
}

.paid { background:#c6f6d5; }
.unpaid { background:#fed7d7; }
</style>
</head>

<body>

<h1>🏠 KOSAN PIDA</h1>
<div class="subtitle">Dashboard Manajemen Penyewa</div>

<div class="dashboard">
<div class="card">Total<h2 id="total"></h2></div>
<div class="card">Terisi<h2 id="isi"></h2></div>
<div class="card">Kosong<h2 id="kosong"></h2></div>
<div class="card">Pemasukan<h2 id="income"></h2></div>
</div>

<div class="box">
<h3>Kamar</h3>
<div id="rooms" class="grid"></div>
</div>

<div class="box">
<h3>Sewa</h3>
<input id="name" placeholder="Nama">
<input type="number" id="startMonth" placeholder="Mulai bulan (1-12)">
<select id="roomSelect"></select>
<button class="btn-primary" onclick="book()">Sewa</button>
</div>

<div class="box">
<h3>Status Penyewa</h3>
<input id="search" placeholder="Cari nama..." oninput="render()">
<button class="btn-danger" onclick="resetData()">Reset Semua</button>
<br><br>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Kamar</th>
<th>Status</th>
<th>Tunggakan</th>
<th>Total</th>
<th>Sisa</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<script>
let PRICE = 500000;
let currentMonth = new Date().getMonth()+1;

let rooms=[];
let bookings=[];

function rupiah(n){
  return "Rp " + n.toLocaleString("id-ID");
}

function load(){
  let r = JSON.parse(localStorage.getItem("rooms"));
  let b = JSON.parse(localStorage.getItem("bookings"));

  if(!r || r.length!==12){
    rooms=[];
    for(let i=1;i<=12;i++){
      rooms.push({number:i,isBooked:false});
    }
    bookings=[];
    save();
  } else {
    rooms=r;
    bookings=b || [];

    rooms.forEach(room=>{
      room.isBooked = bookings.some(bk => bk.room.number === room.number);
    });
  }
}

function save(){
  localStorage.setItem("rooms", JSON.stringify(rooms));
  localStorage.setItem("bookings", JSON.stringify(bookings));
}

function render(){
  let roomDiv=document.getElementById("rooms");
  let select=document.getElementById("roomSelect");
  let list=document.getElementById("list");
  let search=document.getElementById("search").value.toLowerCase();

  roomDiv.innerHTML="";
  select.innerHTML="";
  list.innerHTML="";

  let isi=0, income=0;
  let no = 1;

  rooms.forEach(r=>{
    if(r.isBooked) isi++;

    roomDiv.innerHTML+=`
    <div class="room ${r.isBooked?'isi':'kosong'}">
      Kamar ${r.number}
    </div>`;

    if(!r.isBooked){
      select.innerHTML+=`<option value="${r.number}">Kamar ${r.number}</option>`;
    }
  });

  if(select.innerHTML===""){
    select.innerHTML=`<option>Semua penuh</option>`;
  }

  bookings.forEach((b,realIndex)=>{
    if(!b.name.toLowerCase().includes(search)) return;

    if(!b.paid) b.paid=[];

    let unpaid=0;
    for(let m=b.startMonth;m<=currentMonth;m++){
      if(!b.paid.includes(m)) unpaid++;
    }

    let total=b.paid.length * PRICE;
    let sisa=unpaid * PRICE;
    income+=total;

    let status = unpaid==0
      ? `<span class="badge paid">Lunas</span>`
      : `<span class="badge unpaid">Belum</span>`;

    let warna="";
    if(unpaid>=3) warna="telat2";
    else if(unpaid>0) warna="telat1";

    list.innerHTML+=`
    <tr class="${warna}">
      <td>${no++}</td>
      <td>${b.name}</td>
      <td>${b.room.number}</td>
      <td>${status}</td>
      <td>${unpaid} bulan</td>
      <td>${rupiah(total)}</td>
      <td>${rupiah(sisa)}</td>
      <td>
        <button class="btn-success" onclick="pay(${realIndex})">Bayar</button>
        <button class="btn-warning" onclick="payAll(${realIndex})">All</button>
        <button class="btn-primary" onclick="struk(${realIndex})">Struk</button>
        <button class="btn-danger" onclick="checkout(${realIndex})">Keluar</button>
      </td>
    </tr>`;
  });

  document.getElementById("total").innerText=rooms.length;
  document.getElementById("isi").innerText=isi;
  document.getElementById("kosong").innerText=rooms.length-isi;
  document.getElementById("income").innerText=rupiah(income);
}

function book(){
  let name=document.getElementById("name").value.trim();
  let roomNum=parseInt(document.getElementById("roomSelect").value);
  let inputMonth=parseInt(document.getElementById("startMonth").value);
  let startMonth=(inputMonth>=1 && inputMonth<=12)?inputMonth:currentMonth;

  if(!name) return alert("Isi nama!");
  if(!roomNum) return alert("Kamar penuh!");

  if(bookings.some(b=>b.name.toLowerCase()===name.toLowerCase())){
    return alert("Nama sudah ada!");
  }

  let room=rooms.find(r=>r.number===roomNum);
  room.isBooked=true;

  bookings.push({
    name,
    room:{number:room.number},
    paid:[],
    startMonth
  });

  save(); render();

  document.getElementById("name").value="";
  document.getElementById("startMonth").value="";
}

function pay(i){
  let input = prompt("Masukkan bulan (1,2,3 atau 1-3)");
  if(!input) return;

  let b = bookings[i];
  if(!b.paid) b.paid=[];

  let arr=[];

  if(input.includes("-")){
    let [a,b2]=input.split("-").map(Number);
    for(let m=a;m<=b2;m++) arr.push(m);
  } else if(input.includes(",")){
    arr=input.split(",").map(x=>parseInt(x));
  } else {
    arr=[parseInt(input)];
  }

  arr.forEach(m=>{
    if(isNaN(m)) return;
    if(m>=1 && m<=12 && !b.paid.includes(m)){
      b.paid.push(m);
    }
  });

  save(); render();
}

function payAll(i){
  let b = bookings[i];
  for(let m=b.startMonth;m<=currentMonth;m++){
    if(!b.paid.includes(m)){
      b.paid.push(m);
    }
  }
  save(); render();
}

function checkout(i){
  if(!confirm("Keluarkan penyewa?")) return;

  let room = rooms.find(r => r.number === bookings[i].room.number);
  if(room) room.isBooked=false;

  bookings.splice(i,1);

  save(); render();
}

function resetData(){
  if(confirm("Hapus semua data?")){
    localStorage.clear();
    location.reload();
  }
}

function struk(i){
  let b=bookings[i];
  let total=b.paid.length*PRICE;

  let w=window.open("");
  w.document.write(`
  <body style="font-family:monospace;padding:20px">
  <h2>Kos Mawar Indah</h2>
  <hr>
  Nama: ${b.name}<br>
  Kamar: ${b.room.number}<br>
  Mulai Bulan: ${b.startMonth}<br>
  Dibayar: ${b.paid.join(", ") || "-"}<br>
  Total: ${rupiah(total)}<br>
  <hr>
  ${new Date().toLocaleString("id-ID")}
  </body>
  `);
  w.onload = function(){
    w.print();
    w.onafterprint = () => w.close();
  }
}

load();
render();
</script>

</body>
</html>
